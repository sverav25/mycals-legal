
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCals Legal & Support</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .card {
      border: 1px solid #eeeeee;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      background: #ffffff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: #6f6f6f;
      font-size: 16px;
    }

    .links {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }

    a {
      display: block;
      text-decoration: none;
      color: #111111;
      font-weight: 800;
      padding: 18px 20px;
      border-radius: 18px;
      background: #f5f5f5;
      border: 1px solid #eeeeee;
    }

    a:hover {
      background: #eeeeee;
    }

    .footer {
      margin-top: 28px;
      color: #8a8a8a;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>MyCals Legal & Support</h1>
      <p>
        View MyCals support information, privacy policy, and terms of use.
      </p>

      <div class="links">
        <a href="./help-support.html">Help & Support</a>
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./terms.html">Terms of Use</a>
      </div>
    </section>

    <div class="footer">
      Last updated: May 8, 2026
    </div>
  </main>
</body>
</html>
